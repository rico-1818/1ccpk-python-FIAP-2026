<!DOCTYPE html>
<htm lang="en">
<head>
    <script>
        let dados = [8, 15, 3, 27, 12];
        let procurado = 8;
        let posicao = -1;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === procurado) {
                posicao = i;
                break;
            }
        }
        if(posicao == -1)
            console.log('valor', procurado, 'não encontrado no vetor');
        else
            console.log('valor', procurado, 'encontrado na posição', posicao);

    </script>
    
</head>
<body>
