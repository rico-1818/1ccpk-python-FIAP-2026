<!DOCTYPE html>
<htm lang="en">
<head>
    <script>
        let dados = [8, 15, 3, 27, 12, 15];
        let alvo = 15;
        let contador = 0;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === alvo) {
                contador++;
            }
        }
        if (contador == 0)
            console.log('valor', alvo, 'não encontrado no vetor');
        else
            if (contador == 1)
            console.log('valor', alvo, ' encontrado 1 vez');
            else
            console.log('valor', alvo, ' encontra', contador, 'vezes');
       

    </script>
    
</head>
<body>
